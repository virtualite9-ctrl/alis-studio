<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alis Studio</title>
<style>
:root{
  --bg:#faf9f5; --surface:#ffffff; --surface-1:#f3f2ec; --surface-2:#ffffff;
  --text:#22201d; --text-2:#6b6960; --muted:#9b988e;
  --border:rgba(28,26,23,.10); --border-strong:rgba(28,26,23,.18);
  --clay:#c4623f; --clay-hover:#ad5436; --on-clay:#ffffff; --ok:#5a9367;
  --radius:10px; --shadow:0 1px 2px rgba(28,26,23,.05);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;
  --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,monospace;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#211f1d; --surface:#2b2926; --surface-1:#322f2b; --surface-2:#2b2926;
    --text:#f2efe7; --text-2:#b4b0a4; --muted:#827e74;
    --border:rgba(255,255,255,.12); --border-strong:rgba(255,255,255,.22);
    --clay:#d6795a; --clay-hover:#e08a6c; --on-clay:#1c1a18; --shadow:none;
  }
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;height:100vh;display:flex;flex-direction:column;overflow:hidden;overscroll-behavior:none}
.scroll{flex:1;min-height:0;overflow-y:auto;overscroll-behavior:contain}
button{font-family:inherit;cursor:pointer}
.top{display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:0.5px solid var(--border);background:var(--surface-2);flex:none;z-index:5}
.logo{width:26px;height:26px;border-radius:7px;background:var(--clay);display:flex;align-items:center;justify-content:center;color:var(--on-clay)}
.logo svg{width:16px;height:16px}
.brand{font-size:15px;font-weight:500;letter-spacing:-.01em}
.ver{font-size:11px;font-weight:500;line-height:1;color:var(--muted);background:var(--surface-1);border:0.5px solid var(--border);border-radius:6px;padding:3px 6px;letter-spacing:.02em;cursor:default;user-select:none}
.chip{display:inline-flex;align-items:center;gap:7px;height:28px;padding:0 12px;border:0.5px solid var(--border);border-radius:14px;background:var(--surface);font-size:13px;color:var(--text)}
.chip .dot{width:7px;height:7px;border-radius:50%;background:var(--ok)}
.main{max-width:920px;margin:0 auto;padding:22px 18px 70px;display:flex;gap:20px;align-items:flex-start}
.left{flex:1;min-width:0;display:flex;flex-direction:column;gap:14px}
.right{width:300px;flex:none}
@media (max-width:760px){.main{flex-direction:column}.right{width:100%}}
.composer{border:1px solid var(--border-strong);border-radius:16px;background:var(--surface-2);box-shadow:var(--shadow);padding:13px 14px 11px}
#prompt{width:100%;border:none;outline:none;resize:none;background:transparent;color:var(--text);font:inherit;font-size:16px;line-height:1.55;min-height:54px;max-height:220px;padding:2px}
#prompt::placeholder{color:var(--muted)}
.crow{display:flex;align-items:center;gap:8px;margin-top:10px}
.iconbtn{width:34px;height:34px;border:0.5px solid var(--border);border-radius:17px;background:var(--surface);color:var(--text-2);display:inline-flex;align-items:center;justify-content:center}
.iconbtn:hover{border-color:var(--border-strong)}.iconbtn svg{width:17px;height:17px}.iconbtn.on{color:var(--ok);border-color:var(--border-strong)}
.gen{height:36px;padding:0 18px;border:none;border-radius:18px;background:var(--clay);color:var(--on-clay);font-size:14px;font-weight:500;display:inline-flex;align-items:center;gap:7px;transition:background .12s}
.gen:hover{background:var(--clay-hover)}.gen:disabled{opacity:.55;cursor:default}.gen svg{width:16px;height:16px}
.gen.stop{background:var(--surface-1);color:var(--text);border:0.5px solid var(--border-strong)}.gen.stop:hover{background:var(--surface)}
.panel{border:0.5px solid var(--border);border-radius:14px;background:var(--surface-2);padding:14px 15px}
.ptitle{font-size:13px;font-weight:500;margin-bottom:4px}
.sgrp{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:14px 0 9px;display:flex;align-items:center}
.sgrp .disk{margin-left:auto;text-transform:none;letter-spacing:0;font-family:var(--mono);color:var(--muted)}
.ctl{margin-bottom:11px}
.ctl .lab{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ctl .lab span{font-size:12px;color:var(--text-2)}.ctl .lab b{font-size:12px;font-weight:500;color:var(--text);font-family:var(--mono)}
.fld,select.fld,input.fld,textarea.fld{width:100%;height:32px;border:0.5px solid var(--border);border-radius:8px;background:var(--surface);padding:0 10px;font:inherit;font-size:13px;color:var(--text);display:flex;align-items:center}
select.fld{appearance:none;-webkit-appearance:none;cursor:pointer;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239b988e' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 9px center;padding-right:28px}
input.fld[type=number]{-moz-appearance:textfield}input.fld::-webkit-outer-spin-button,input.fld::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=range]{width:100%;accent-color:var(--clay)}
.aspects{display:flex;gap:5px;margin-top:7px}
.ap{flex:1;height:26px;border:0.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-2);font-size:11px;display:inline-flex;align-items:center;justify-content:center}
.ap.on{border:1.5px solid var(--clay);color:var(--clay)}
.seedrow{display:flex;gap:6px}.seedrow input{flex:1}
.sq{width:32px;height:32px;border:0.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-2);display:inline-flex;align-items:center;justify-content:center;flex:none}.sq:hover{border-color:var(--border-strong)}.sq svg{width:16px;height:16px}
.hint{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.4}
.phint{font-size:12px;color:var(--muted);margin:7px 2px 0;line-height:1.4}.phint:empty{display:none}
.enhbtn{height:34px;padding:0 12px;border:0.5px solid var(--border-strong);border-radius:17px;background:var(--surface);color:var(--text);font-size:13px;display:none;align-items:center;gap:6px}
.enhbtn.show{display:inline-flex}.enhbtn:hover{background:var(--surface-1)}.enhbtn:disabled{opacity:.55}.enhbtn svg{width:15px;height:15px}
.swrow{display:flex;align-items:center;gap:10px;padding:10px 0 2px;border-top:0.5px solid var(--border);margin-top:12px}
.swrow .swtxt{flex:1;min-width:0}.swn{font-size:13px;color:var(--text)}.swh{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.sw{width:38px;height:22px;border-radius:11px;background:var(--surface-1);border:0.5px solid var(--border-strong);position:relative;flex:none;cursor:pointer;transition:background .15s}
.sw i{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--text-2);transition:transform .15s,background .15s}
.sw.on{background:var(--clay);border-color:var(--clay)}.sw.on i{transform:translateX(16px);background:var(--on-clay)}
.sw.disabled{opacity:.45;cursor:not-allowed}
.modal{position:fixed;inset:0;background:rgba(20,18,16,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal.show{display:flex}
.mbox{background:var(--surface-2);border:0.5px solid var(--border-strong);border-radius:16px;max-width:390px;padding:18px 18px 14px;box-shadow:0 16px 44px rgba(20,18,16,.3)}
.mbox h3{margin:0 0 8px;font-size:15px;font-weight:600;color:var(--text)}.mbox p{margin:0 0 15px;font-size:13px;color:var(--text-2);line-height:1.5}
.mbtns{display:flex;gap:8px;justify-content:flex-end}
.mbtn{height:34px;padding:0 14px;border-radius:9px;border:0.5px solid var(--border-strong);background:var(--surface);color:var(--text);font-size:13px;font-weight:500}
.mbtn:hover{background:var(--surface-1)}.mbtn.primary{background:var(--clay);color:var(--on-clay);border-color:var(--clay)}.mbtn.primary:hover{background:var(--clay-hover)}
.gbtn{display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 11px;border:0.5px solid var(--border);border-radius:14px;background:var(--surface);font-size:13px;color:var(--text);cursor:pointer}
.gbtn:hover{border-color:var(--border-strong)}.gbtn svg{width:15px;height:15px}
.galv{max-width:920px;margin:0 auto;padding:18px 18px 70px}
.galv h2{font-size:15px;font-weight:500;margin:0 0 14px}
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.gcard{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--surface-2)}
.gcard img{display:block;width:100%;aspect-ratio:1;object-fit:cover;background:var(--surface-1)}
.gcap{padding:9px 11px}
.gcap .gp{font-size:12px;color:var(--text-2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:33px}
.gcap .gm{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:6px;display:flex;align-items:center;gap:9px}
.gcap .gm .sp{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gact{color:var(--text-2);cursor:pointer;display:inline-flex;flex:none}.gact:hover{color:var(--text)}.gact svg{width:15px;height:15px}
.gempty{text-align:center;color:var(--muted);font-size:14px;padding:50px 0}
textarea.fld{height:auto;min-height:54px;padding:8px 10px;resize:vertical;line-height:1.4}
.disabled{opacity:.5;pointer-events:none}
.picker{position:relative}
.mpick{width:100%;height:46px;border:0.5px solid var(--border-strong);border-radius:10px;background:var(--surface-2);padding:0 11px;display:flex;align-items:center;gap:10px;cursor:pointer;color:var(--text);font:inherit}
.mpick:hover{background:var(--surface-1)}
.mpico{width:28px;height:28px;border-radius:7px;background:var(--surface-1);display:flex;align-items:center;justify-content:center;color:var(--text-2);flex:none}.mpico svg{width:16px;height:16px}
.mptxt{min-width:0;flex:1;text-align:left;line-height:1.25}
.mpn{display:block;font-size:13px;font-weight:500}
.mpv{display:block;font-size:11px;color:var(--muted);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mpchev{color:var(--muted);display:inline-flex;flex:none}.mpchev svg{width:17px;height:17px}
.mpop{display:none;position:absolute;top:calc(100% + 5px);left:0;right:0;z-index:30;max-height:330px;overflow:auto;background:var(--surface-2);border:0.5px solid var(--border-strong);border-radius:12px;padding:5px;box-shadow:0 10px 30px rgba(20,18,16,.18)}
.mpop.open{display:block}
.mpg{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:8px 9px 4px}
.mpr{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:8px;cursor:pointer;flex-wrap:wrap}
.mpr:hover{background:var(--surface-1)}
.mpr.on{background:rgba(196,98,63,.10)}
.mpri{width:26px;height:26px;border-radius:6px;background:var(--surface-1);display:flex;align-items:center;justify-content:center;color:var(--text-2);flex:none}.mpri svg{width:15px;height:15px}
.mprt{min-width:0;flex:1;line-height:1.25}
.mprn{display:block;font-size:13px;color:var(--text)}
.mprs{display:block;font-size:11px;color:var(--muted);font-family:var(--mono)}
.mpra{display:inline-flex;align-items:center;gap:7px;color:var(--text-2);flex:none}.mpra svg{width:16px;height:16px}.mpra .ok{color:var(--clay);display:inline-flex}
.mpdel{display:inline-flex;color:var(--muted);cursor:pointer}.mpdel:hover{color:var(--text)}.mpdel svg{width:15px;height:15px}
.mprog{height:4px;border-radius:2px;background:var(--surface-1);overflow:hidden;margin-top:8px;flex-basis:100%}.mprog i{display:block;height:100%;width:0;background:var(--clay);border-radius:2px;transition:width .3s}
.progress{display:none;margin:8px 0 2px}.progress.show{display:block}
.bar{height:4px;border-radius:2px;background:var(--surface-1);overflow:hidden}.bar i{display:block;height:100%;width:0;background:var(--clay);border-radius:2px;transition:width .25s}
.pmeta{display:flex;justify-content:space-between;font-size:12px;color:var(--text-2);margin-top:8px;font-family:var(--mono)}
#results{display:flex;flex-direction:column;gap:14px}
.card{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--surface-2)}.card img{display:block;width:100%}
.cap{display:flex;align-items:center;gap:10px;padding:10px 12px}
.cap .txt{font-size:13px;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cap .meta{margin-left:auto;font-size:12px;color:var(--muted);font-family:var(--mono);white-space:nowrap}
.cap a{color:var(--text-2);display:inline-flex}.cap a:hover{color:var(--text)}.cap a svg{width:17px;height:17px}
.empty{text-align:center;color:var(--muted);font-size:14px;padding-top:6px}
.empty svg{width:100%;border-radius:14px;border:1px solid var(--border);display:block;margin:0 auto 12px;opacity:.85}
.err{display:none;border:1px solid var(--border);border-left:3px solid var(--clay);background:var(--surface-1);color:var(--text);font-size:13px;padding:11px 13px;border-radius:0 var(--radius) var(--radius) 0}.err.show{display:block}
</style>
</head>
<body>
<div class="top">
  <span class="logo" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 3.3l.55 1.5 1.5.55-1.5.55-.55 1.5-.55-1.5-1.5-.55 1.5-.55z"/><path d="M12 2.7 L14.55 8.1 L13.2 8.1 L15.9 12.6 L13.55 12.6 L17.35 17.2 L13.05 17.2 L13.05 20.9 L10.95 20.9 L10.95 17.2 L6.65 17.2 L10.45 12.6 L8.1 12.6 L10.8 8.1 L9.45 8.1 Z"/></svg></span>
  <span class="brand">Alis Studio</span>
  <span class="ver" id="ver" title="Alis Studio v__ALIS_VERSION__">v__ALIS_VERSION__</span>
  <span style="flex:1"></span>
  <button class="gbtn" id="galleryBtn" title="Gallery"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>Gallery</button>
  <span class="chip" id="activeChip" title="Active model"><span class="dot"></span><span id="activeName">—</span></span>
</div>

<div class="scroll">
<div class="main">
  <div class="left">
    <div class="composer">
      <textarea id="prompt" rows="2" placeholder="Describe an image to generate…">a serene mountain lake at sunrise, mist over the water</textarea>
      <div class="crow">
        <button class="iconbtn on" id="safety" aria-label="NSFW safety filter on" title="NSFW safety filter: on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v6c0 4.4-3 7.6-7 9-4-1.4-7-4.6-7-9V6z"/><path d="M9 12l2 2 4-4"/></svg></button>
        <button class="enhbtn" id="enhbtn" title="Rewrite the prompt in English with a local model"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.9 5.1L19 9l-5.1 1.9L12 16l-1.9-5.1L5 9l5.1-1.9z"/></svg>Enhance</button>
        <span style="flex:1"></span>
        <button class="gen" id="gen" disabled><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.9 5.1L19 9l-5.1 1.9L12 16l-1.9-5.1L5 9l5.1-1.9z"/></svg>Generate</button>
      </div>
    </div>
    <div class="phint" id="phint"></div>
    <div class="progress" id="progress"><div class="bar"><i id="barfill"></i></div><div class="pmeta"><span id="pstep">Loading model…</span><span id="ptime"></span></div></div>
    <div class="err" id="err"></div>
    <div id="results"></div>
    <div class="empty" id="empty">
      <svg viewBox="0 0 560 300" aria-hidden="true"><rect width="560" height="300" fill="#e7ecf2"/><circle cx="416" cy="76" r="32" fill="#e9a87e"/><polygon points="0,212 140,95 280,212" fill="#c7d0db"/><polygon points="176,232 350,70 552,232" fill="#aebac8"/><polygon points="318,130 350,70 382,130" fill="#f1efe9"/><rect y="210" width="560" height="90" fill="#d7dfe8"/></svg>
      Your images will appear here.
    </div>
  </div>
  <div class="right">
    <div class="panel"><div class="ptitle">Settings</div><div id="modelGroup"></div><div id="paramGroups"></div><div id="enhanceRow"></div></div>
  </div>
</div>

<div class="galv" id="galleryView" style="display:none">
  <h2>Gallery</h2>
  <div class="ggrid" id="ggrid"></div>
  <div class="gempty" id="gempty" style="display:none">No images yet. What you generate is saved here automatically.</div>
</div>
</div>

<div class="modal" id="modal"><div class="mbox"><h3 id="mtitle"></h3><p id="mtext"></p><div class="mbtns"><button class="mbtn" id="mcancel">Cancel</button><button class="mbtn primary" id="mok">Enable</button></div></div></div>

<script>
const $=s=>document.querySelector(s);
const prompt=$("#prompt"),gen=$("#gen"),results=$("#results"),empty=$("#empty"),errBox=$("#err");
const progress=$("#progress"),barfill=$("#barfill"),pstep=$("#pstep"),ptime=$("#ptime");
const modelGroup=$("#modelGroup"),paramGroups=$("#paramGroups"),activeName=$("#activeName"),safetyBtn=$("#safety");
let BACKENDS=[],CATALOG={backends:[],disk_gb:0},PV={},current="",safetyOn=true,busy=false,t0=0,timer=null,aborter=null;
let SYS={ram_gib:0,constrained:false,enhance_available:false,enhance_model:""},enhanceOn=false,galleryOn=false;
const SVG_DL='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>';
const SVG_CUBE='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" aria-hidden="true"><path d="M12 2l9 5v10l-9 5-9-5V7z"/><path d="M3 7l9 5 9-5M12 12v10"/></svg>';
const SVG_CHECK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12l5 5 9-10"/></svg>';
const SVG_DLI='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>';
const SVG_TRASH='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>';
const SVG_CHEVD='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>';
const SVG_GEN='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.9 5.1L19 9l-5.1 1.9L12 16l-1.9-5.1L5 9l5.1-1.9z"/></svg>';
const SVG_STOP='<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2.5"/></svg>';
const SVG_GRID='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>';
const SVG_BACK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l1.9 5.1L19 9l-5.1 1.9L12 16l-1.9-5.1L5 9l5.1-1.9z" fill="currentColor" stroke="none"/></svg>';
const SVG_REUSE='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>';
const fmt=n=>(Math.round(n*10)/10).toFixed(1);
const showErr=m=>{errBox.textContent=m;errBox.classList.add("show");};
const m16=(x,min,max)=>Math.max(min,Math.min(max,Math.round(x/16)*16));
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const backendOf=v=>BACKENDS.find(b=>b.id===(v||"").split(":")[0]);

prompt.addEventListener("input",()=>{prompt.style.height="auto";prompt.style.height=Math.min(prompt.scrollHeight,220)+"px";});
prompt.addEventListener("keydown",e=>{if((e.metaKey||e.ctrlKey)&&e.key==="Enter")generate();});
safetyBtn.addEventListener("click",()=>{safetyOn=!safetyOn;safetyBtn.classList.toggle("on",safetyOn);safetyBtn.title="NSFW safety filter: "+(safetyOn?"on":"off");});
gen.addEventListener("click",()=>{busy?stopGen():generate();});
$("#enhbtn").addEventListener("click",doEnhance);
$("#galleryBtn").addEventListener("click",()=>toggleGallery());
function toggleGallery(on){
  galleryOn = (on===undefined)? !galleryOn : on;
  document.querySelector(".main").style.display = galleryOn?"none":"flex";
  $("#galleryView").style.display = galleryOn?"block":"none";
  $("#galleryBtn").innerHTML = galleryOn ? (SVG_BACK+"Generate") : (SVG_GRID+"Gallery");
  if(galleryOn) loadGallery();
}
async function loadGallery(){
  try{ const d=await(await fetch("/api/gallery")).json(); renderGallery(d.items||[]); }
  catch(e){ $("#ggrid").innerHTML=""; $("#gempty").style.display="block"; $("#gempty").textContent="Couldn't load gallery: "+e.message; }
}
function renderGallery(items){
  const grid=$("#ggrid"); grid.innerHTML="";
  $("#gempty").style.display = items.length?"none":"block";
  items.forEach(it=>{
    const card=el("div","gcard");
    const meta=(it.model||"")+" · "+it.width+"×"+it.height+" · seed "+it.seed;
    card.innerHTML='<img loading="lazy" src="/api/gallery/'+it.id+'.png" alt="">'
      +'<div class="gcap"><div class="gp">'+(it.prompt||"").replace(/</g,"&lt;")+'</div>'
      +'<div class="gm"><span class="sp" title="'+meta+'">'+meta+'</span>'
      +'<span class="gact" data-a="use" title="Use this prompt">'+SVG_REUSE+'</span>'
      +'<a class="gact" data-a="dl" title="Download">'+SVG_DL+'</a>'
      +'<span class="gact" data-a="del" title="Delete">'+SVG_TRASH+'</span></div></div>';
    card.querySelector('[data-a="use"]').onclick=()=>{prompt.value=it.prompt||"";prompt.dispatchEvent(new Event("input"));toggleGallery(false);};
    card.querySelector('[data-a="dl"]').onclick=()=>{const a=document.createElement("a");a.href="/api/gallery/"+it.id+".png";a.download="alis_"+it.seed+".png";a.click();};
    card.querySelector('[data-a="del"]').onclick=()=>delGallery(it.id);
    grid.appendChild(card);
  });
}
async function delGallery(id){
  try{ await fetch("/api/gallery/delete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id})}); }catch(e){}
  loadGallery();
}
document.addEventListener("click",e=>{if(POPEN&&!e.target.closest(".picker")){POPEN=false;const p=document.querySelector(".mpop");if(p)p.classList.remove("open");}});

async function loadAll(){
  try{
    const[m,c]=await Promise.all([fetch("/api/models").then(r=>r.json()),fetch("/api/catalog").then(r=>r.json())]);
    BACKENDS=m.backends||[]; CATALOG=c||{backends:[],disk_gb:0};
    if(!BACKENDS.length){showErr("No models available. Install a backend and restart.");return;}
    const builds=allBuilds(); const first=builds.find(b=>b.installed)||builds[0];
    if(!first){showErr("No model builds found.");return;}
    setActive(first.backend+":"+first.variant,true);
    reconcile();
  }catch(e){showErr("Couldn’t reach the server: "+e.message);}
  try{SYS=await fetch("/api/system").then(r=>r.json());}catch(e){}
  try{enhanceOn=!!SYS.enhance_available&&localStorage.getItem("alis_enhance")==="1";}catch(e){}
  renderEnhance();
}
function persistEnhance(){try{localStorage.setItem("alis_enhance",enhanceOn?"1":"0");}catch(e){}}
function renderEnhance(){
  const avail=SYS.enhance_available;
  const hint=!avail?'Install mlx-lm to enable — pip install "alis-studio[rewrite]"'
    :SYS.constrained?('Loads a ~2.3 GB local model; may strain memory on this '+SYS.ram_gib+' GB Mac.')
    :'Translates non-English prompts to English and enriches them — runs locally (~2.3 GB model).';
  $("#enhanceRow").innerHTML='<div class="swrow"><div class="swtxt"><div class="swn">Prompt enhancer</div><div class="swh">'+hint+'</div></div><div class="sw'+(enhanceOn?' on':'')+(avail?'':' disabled')+'" id="enhSw" role="switch" aria-checked="'+(enhanceOn?'true':'false')+'"><i></i></div></div>';
  $("#enhSw").onclick=()=>{if(avail)toggleEnhance();};
  $("#enhbtn").classList.toggle("show",enhanceOn&&avail);
}
function toggleEnhance(){
  if(enhanceOn){enhanceOn=false;persistEnhance();renderEnhance();return;}
  const on=()=>{enhanceOn=true;persistEnhance();renderEnhance();};
  if(SYS.constrained)showModal("Enable prompt enhancer?","This loads a local model ("+(SYS.enhance_model.split("/").pop()||"~2.3 GB")+") that runs alongside the image model. On this Mac ("+SYS.ram_gib+" GB) they may compete for memory and slow down or run out of memory. Enable anyway?",on);
  else on();
}
function showModal(title,text,onok){
  $("#mtitle").textContent=title;$("#mtext").textContent=text;const m=$("#modal");m.classList.add("show");
  $("#mok").onclick=()=>{m.classList.remove("show");onok&&onok();};
  $("#mcancel").onclick=()=>m.classList.remove("show");
}
async function doEnhance(){
  const p=prompt.value.trim();if(!p||busy)return;
  const enh=$("#enhbtn"),old=enh.innerHTML;enh.disabled=true;enh.innerHTML=SVG_GEN+"Enhancing…";errBox.classList.remove("show");
  try{
    const r=await fetch("/api/enhance",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt:p})});
    const d=await r.json().catch(()=>({}));
    if(!r.ok)throw new Error(d.error||("server "+r.status));
    prompt.value=d.rewritten;prompt.dispatchEvent(new Event("input"));
  }catch(e){showErr("Enhance failed: "+e.message);}
  finally{enh.disabled=false;enh.innerHTML=old;}
}
let DOWNLOADING=false;
let POPEN=false;   // is the model picker popover open
// the authoritative build list is /api/models variants, enriched with /api/catalog (size + install
// state). a variant with no catalog entry is a local/non-downloadable model: always usable, no buttons.
function allBuilds(){
  const cat={};(CATALOG.backends||[]).forEach(b=>b.entries.forEach(e=>cat[b.id+":"+e.variant]=e));
  const out=[];
  BACKENDS.forEach(b=>b.variants.forEach(v=>{const c=cat[b.id+":"+v.id];
    out.push({backend:b.id,blabel:b.label,variant:v.id,label:v.label,
      installed:c?!!c.installed:true,downloadable:!!c,size_gb:c?c.size_gb:null,note:c?c.note:(b.info||null)});}));
  return out;
}
const buildOf=model=>allBuilds().find(b=>b.backend+":"+b.variant===model);

function setActive(model,initial){
  const changedBackend=backendOf(model)!==backendOf(current);
  current=model;
  const b=backendOf(model),bld=buildOf(model);
  activeName.textContent=b.label+" · "+(bld?bld.label.split(" · ")[0]:model.split(":")[1]);
  $("#phint").textContent=b.prompt_note||"";
  if(initial||changedBackend)renderParams(b);
  renderModelGroup();
}

// keep `current` on an installed build and gate Generate on it — never silently download via Generate
function reconcile(){
  const builds=allBuilds(),cur=builds.find(b=>b.backend+":"+b.variant===current);
  if(!cur||!cur.installed){const inst=builds.find(b=>b.installed);if(inst)setActive(inst.backend+":"+inst.variant);}
  const now=buildOf(current);
  gen.disabled=busy||!(now&&now.installed);
}

function renderModelGroup(){
  modelGroup.innerHTML="";
  const head=el("div","sgrp","Model");head.appendChild(el("span","disk",(CATALOG.disk_gb||0)+" GB"));modelGroup.appendChild(head);
  const wrap=el("div","picker"),cur=buildOf(current);
  const btn=el("button","mpick",'<span class="mpico">'+SVG_CUBE+'</span><span class="mptxt"><span class="mpn">'+(cur?cur.blabel:"Select a model")+'</span><span class="mpv">'+(cur?cur.label:"")+'</span></span><span class="mpchev">'+SVG_CHEVD+'</span>');
  btn.setAttribute("aria-label","Choose model");btn.setAttribute("aria-expanded",POPEN?"true":"false");
  const pop=el("div","mpop"+(POPEN?" open":""));
  const builds=allBuilds(),byB={};
  builds.forEach(b=>(byB[b.backend]=byB[b.backend]||[]).push(b));   // group builds under each model in the popover
  Object.entries(byB).forEach(([bid,grp])=>{pop.appendChild(el("div","mpg",grp[0].blabel));grp.forEach(b=>pop.appendChild(popRow(b)));});
  btn.onclick=e=>{e.stopPropagation();POPEN=!POPEN;pop.classList.toggle("open",POPEN);btn.setAttribute("aria-expanded",POPEN?"true":"false");};
  wrap.appendChild(btn);wrap.appendChild(pop);modelGroup.appendChild(wrap);
}

function popRow(b){
  const id=b.backend+":"+b.variant,active=(id===current);
  const r=el("div","mpr"+(active?" on":""));
  const sub=b.downloadable?((b.size_gb?b.size_gb+" GB":"")+(b.note?" · "+b.note:"")):(b.note||"");
  r.innerHTML='<span class="mpri">'+SVG_CUBE+'</span><span class="mprt"><span class="mprn">'+b.label+'</span>'+(sub?'<span class="mprs">'+sub+'</span>':'')+'</span>';
  const act=el("span","mpra");
  if(active)act.innerHTML='<span class="ok">'+SVG_CHECK+'</span>';
  else if(b.downloadable&&!b.installed)act.innerHTML=SVG_DLI;
  if(b.downloadable&&b.installed){const d=el("span","mpdel",SVG_TRASH);d.title="Delete "+b.label;d.setAttribute("aria-label","Delete "+b.label);d.onclick=e=>{e.stopPropagation();delVariant(b);};act.appendChild(d);}
  r.appendChild(act);
  r.setAttribute("aria-label",b.blabel+" · "+b.label);
  r.onclick=()=>{if(b.downloadable&&!b.installed)dlVariant(b,r,act);else{POPEN=false;setActive(id);}};
  return r;
}

async function dlVariant(b,r,btn){
  if(DOWNLOADING){showErr("A download is already in progress.");return;}
  DOWNLOADING=true;btn.disabled=true;btn.textContent="Starting…";
  const pr=el("div","mprog","<i></i>");r.appendChild(pr);const fill=pr.querySelector("i");
  try{
    const res=await fetch("/api/download",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({backend:b.backend,variant:b.variant})});
    if(!res.ok||!res.body)throw new Error("server "+res.status);
    const reader=res.body.getReader(),dec=new TextDecoder();let buf="";
    while(true){const{value,done}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});let nl;
      while((nl=buf.indexOf("\n"))>=0){const line=buf.slice(0,nl);buf=buf.slice(nl+1);if(!line.trim())continue;const ev=JSON.parse(line);
        if(ev.type==="progress"){fill.style.width=(ev.total?Math.round(ev.done/ev.total*100):0)+"%";btn.textContent=fmt(ev.done/1e9)+" / "+fmt(ev.total/1e9)+" GB";}
        else if(ev.type==="error"){showErr(ev.message);}
      }}
  }catch(err){showErr("Download failed: "+err.message);}
  DOWNLOADING=false;await refreshCatalog();
}
async function delVariant(b){
  try{await fetch("/api/delete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({backend:b.backend,variant:b.variant})});}
  catch(err){showErr("Delete failed: "+err.message);}
  await refreshCatalog();
}
async function refreshCatalog(){try{CATALOG=await(await fetch("/api/catalog")).json();}catch(e){}renderModelGroup();reconcile();}

function renderParams(b){
  paramGroups.innerHTML="";PV={};
  if(!b||!b.params)return;
  const groups={};b.params.forEach(p=>(groups[p.group||"Settings"]=groups[p.group||"Settings"]||[]).push(p));
  for(const[g,ps]of Object.entries(groups)){paramGroups.appendChild(el("div","sgrp",g));ps.forEach(p=>paramGroups.appendChild(control(p)));}
}

function control(p){
  const c=el("div","ctl");
  if(p.type==="resolution"){
    PV.width=p.default_size;PV.height=p.default_size;let base=p.default_size,asp=p.default_aspect;
    const apply=()=>{const[a,bb]=asp.split(":").map(Number);let w,h;if(a>=bb){w=base;h=base*bb/a;}else{h=base;w=base*a/bb;}PV.width=m16(w,p.min,p.max);PV.height=m16(h,p.min,p.max);dim.textContent=PV.width+" × "+PV.height;};
    c.appendChild(el("div","lab","<span>"+p.label+"</span><b id='dimout'></b>"));
    const sel=el("select","fld");p.sizes.forEach(s=>{const o=el("option",null,s+" px");o.value=s;if(s===base)o.selected=true;sel.appendChild(o);});
    sel.onchange=()=>{base=+sel.value;apply();};c.appendChild(sel);
    const aw=el("div","aspects");p.aspects.forEach(a=>{const t=el("div","ap"+(a===asp?" on":""),a);t.onclick=()=>{asp=a;[...aw.children].forEach(x=>x.classList.remove("on"));t.classList.add("on");apply();};aw.appendChild(t);});
    c.appendChild(aw);const dim=c.querySelector("#dimout");apply();return c;
  }
  if(p.type==="int"||p.type==="float"){
    const step=p.step||(p.type==="float"?0.1:1);PV[p.key]=p.default;
    c.appendChild(el("div","lab","<span>"+p.label+"</span><b class='vo'>"+(p.type==="float"?p.default.toFixed(1):p.default)+"</b>"));
    const r=document.createElement("input");r.type="range";r.min=p.min;r.max=p.max;r.step=step;r.value=p.default;if(p.fixed)r.disabled=true;
    r.oninput=()=>{const v=+r.value;PV[p.key]=v;c.querySelector(".vo").textContent=p.type==="float"?v.toFixed(1):v;};
    c.appendChild(r);if(p.fixed)c.classList.add("disabled");if(p.hint)c.appendChild(el("div","hint",p.hint));return c;
  }
  if(p.type==="select"){
    PV[p.key]=p.default;c.appendChild(el("div","lab","<span>"+p.label+"</span>"));
    const sel=el("select","fld");p.options.forEach(o=>{const op=el("option",null,o.label);op.value=o.value;if(o.value===p.default)op.selected=true;sel.appendChild(op);});
    if(p.fixed){sel.disabled=true;c.classList.add("disabled");}sel.onchange=()=>PV[p.key]=sel.value;c.appendChild(sel);if(p.hint)c.appendChild(el("div","hint",p.hint));return c;
  }
  if(p.type==="seed"){
    PV.seed=p.default;c.appendChild(el("div","lab","<span>"+p.label+"</span>"));
    const row=el("div","seedrow");const inp=document.createElement("input");inp.type="number";inp.min=0;inp.className="fld";inp.value=p.default;
    inp.oninput=()=>PV.seed=Math.max(0,parseInt(inp.value||"0"));
    const dice=el("button","sq",'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.3" fill="currentColor"/><circle cx="15.5" cy="15.5" r="1.3" fill="currentColor"/><circle cx="12" cy="12" r="1.3" fill="currentColor"/></svg>');
    dice.title="Randomize seed";dice.onclick=()=>{const s=Math.floor(Math.random()*1e9);inp.value=s;PV.seed=s;};
    row.appendChild(inp);row.appendChild(dice);c.appendChild(row);return c;
  }
  if(p.type==="text"){
    PV[p.key]=p.default||"";c.appendChild(el("div","lab","<span>"+p.label+"</span>"));
    const ta=document.createElement("textarea");ta.className="fld";ta.value=p.default||"";if(p.enabled===false){ta.disabled=true;ta.placeholder="unsupported by this model";c.classList.add("disabled");}
    ta.oninput=()=>PV[p.key]=ta.value;c.appendChild(ta);if(p.hint)c.appendChild(el("div","hint",p.hint));return c;
  }
  return c;
}

function setBusy(b){busy=b;if(b){gen.disabled=false;gen.classList.add("stop");gen.innerHTML=SVG_STOP+"Stop";}else{gen.classList.remove("stop");gen.innerHTML=SVG_GEN+"Generate";reconcile();}}
function stopGen(){if(!busy)return;pstep.textContent="Stopping…";fetch("/api/cancel",{method:"POST"}).catch(()=>{});if(aborter)aborter.abort();}
async function generate(){
  if(busy)return;const p=prompt.value.trim();errBox.classList.remove("show");
  if(!p){showErr("Enter a prompt.");return;}
  if(!current){showErr("No model selected.");return;}
  const body={prompt:p,model:current,safety:safetyOn,params:{...PV}};
  setBusy(true);empty.style.display="none";
  progress.classList.add("show");barfill.style.width="0%";pstep.textContent="Loading model…";ptime.textContent="";
  t0=Date.now();clearInterval(timer);timer=setInterval(()=>ptime.textContent=fmt((Date.now()-t0)/1000)+"s",100);
  aborter=new AbortController();
  try{
    const res=await fetch("/api/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body),signal:aborter.signal});
    if(!res.ok||!res.body)throw new Error("server error "+res.status);
    const reader=res.body.getReader(),dec=new TextDecoder();let buf="";
    while(true){const{value,done}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});let nl;
      while((nl=buf.indexOf("\n"))>=0){const line=buf.slice(0,nl);buf=buf.slice(nl+1);if(line.trim())handle(JSON.parse(line),p);}}
  }catch(e){if(e.name!=="AbortError")showErr("Generation failed: "+e.message);}
  finally{aborter=null;setBusy(false);clearInterval(timer);progress.classList.remove("show");}
}
function handle(ev,p){
  if(ev.type==="step"){barfill.style.width=Math.round(ev.step/ev.total*100)+"%";pstep.textContent="Generating · step "+ev.step+" / "+ev.total;}
  else if(ev.type==="done"){barfill.style.width="100%";ev.images.forEach((u,i)=>renderCard(u,p,ev.meta,i,ev.images.length));}
  else if(ev.type==="cancelled"){pstep.textContent="Stopped.";}
  else if(ev.type==="error"){showErr(ev.message||"Generation failed.");}
}
function renderCard(uri,p,meta,i,n){
  const card=el("div","card");const sl=meta.seed+(n>1?("·"+(i+1)):"");
  card.innerHTML='<img alt="'+p.replace(/"/g,"&quot;")+'" src="'+uri+'"><div class="cap"><span class="txt">'+p+'</span><span class="meta">'+meta.model+' · '+meta.width+'×'+meta.height+' · '+meta.steps+' steps · seed '+sl+' · '+fmt(meta.seconds)+'s</span><a title="Download" aria-label="Download">'+SVG_DL+'</a></div>';
  card.querySelector("a").onclick=()=>{const a=document.createElement("a");a.href=uri;a.download="alis_"+meta.seed+(n>1?("_"+(i+1)):"")+".png";a.click();};
  results.insertBefore(card,results.firstChild);
}
// version is normally substituted server-side; fall back to /api/version if served raw
if($("#ver").textContent.includes("__ALIS")){fetch("/api/version").then(r=>r.json()).then(d=>{const v="v"+d.version;$("#ver").textContent=v;$("#ver").title="Alis Studio "+v;}).catch(()=>$("#ver").remove());}
loadAll();
</script>
