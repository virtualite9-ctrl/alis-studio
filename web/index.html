<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alis Studio</title>
<style>
:root{
  --bg:#faf9f5; --surface:#ffffff; --surface-1:#f3f2ec; --surface-2:#ffffff;
  --text:#22201d; --text-2:#6b6960; --muted:#9b988e;
  --border:rgba(28,26,23,.10); --border-strong:rgba(28,26,23,.18);
  --clay:#c4623f; --clay-hover:#ad5436; --on-clay:#ffffff; --ok:#5a9367;
  --radius:10px; --shadow:0 1px 2px rgba(28,26,23,.05);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;
  --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,monospace;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#211f1d; --surface:#2b2926; --surface-1:#322f2b; --surface-2:#2b2926;
    --text:#f2efe7; --text-2:#b4b0a4; --muted:#827e74;
    --border:rgba(255,255,255,.12); --border-strong:rgba(255,255,255,.22);
    --clay:#d6795a; --clay-hover:#e08a6c; --on-clay:#1c1a18; --shadow:none;
  }
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
.top{display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:0.5px solid var(--border);background:var(--surface-2);position:sticky;top:0;z-index:5}
.logo{width:26px;height:26px;border-radius:7px;background:var(--clay);display:flex;align-items:center;justify-content:center;color:var(--on-clay)}
.logo svg{width:16px;height:16px}
.brand{font-size:15px;font-weight:500;letter-spacing:-.01em}
.chip{display:inline-flex;align-items:center;gap:7px;height:28px;padding:0 12px;border:0.5px solid var(--border);border-radius:14px;background:var(--surface);font-size:13px;color:var(--text)}
.chip .dot{width:7px;height:7px;border-radius:50%;background:var(--ok)}
.main{max-width:920px;margin:0 auto;padding:22px 18px 70px;display:flex;gap:20px;align-items:flex-start}
.left{flex:1;min-width:0;display:flex;flex-direction:column;gap:14px}
.right{width:300px;flex:none}
@media (max-width:760px){.main{flex-direction:column}.right{width:100%}}
.composer{border:1px solid var(--border-strong);border-radius:16px;background:var(--surface-2);box-shadow:var(--shadow);padding:13px 14px 11px}
#prompt{width:100%;border:none;outline:none;resize:none;background:transparent;color:var(--text);font:inherit;font-size:16px;line-height:1.55;min-height:54px;max-height:220px;padding:2px}
#prompt::placeholder{color:var(--muted)}
.crow{display:flex;align-items:center;gap:8px;margin-top:10px}
.iconbtn{width:34px;height:34px;border:0.5px solid var(--border);border-radius:17px;background:var(--surface);color:var(--text-2);display:inline-flex;align-items:center;justify-content:center}
.iconbtn:hover{border-color:var(--border-strong)}.iconbtn svg{width:17px;height:17px}.iconbtn.on{color:var(--ok);border-color:var(--border-strong)}
.gen{height:36px;padding:0 18px;border:none;border-radius:18px;background:var(--clay);color:var(--on-clay);font-size:14px;font-weight:500;display:inline-flex;align-items:center;gap:7px;transition:background .12s}
.gen:hover{background:var(--clay-hover)}.gen:disabled{opacity:.55;cursor:default}.gen svg{width:16px;height:16px}
.panel{border:0.5px solid var(--border);border-radius:14px;background:var(--surface-2);padding:14px 15px}
.ptitle{font-size:13px;font-weight:500;margin-bottom:4px}
.sgrp{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:14px 0 9px;display:flex;align-items:center}
.sgrp .disk{margin-left:auto;text-transform:none;letter-spacing:0;font-family:var(--mono);color:var(--muted)}
.ctl{margin-bottom:11px}
.ctl .lab{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ctl .lab span{font-size:12px;color:var(--text-2)}.ctl .lab b{font-size:12px;font-weight:500;color:var(--text);font-family:var(--mono)}
.fld,select.fld,input.fld,textarea.fld{width:100%;height:32px;border:0.5px solid var(--border);border-radius:8px;background:var(--surface);padding:0 10px;font:inherit;font-size:13px;color:var(--text);display:flex;align-items:center}
select.fld{appearance:none;-webkit-appearance:none;cursor:pointer;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239b988e' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 9px center;padding-right:28px}
input.fld[type=number]{-moz-appearance:textfield}input.fld::-webkit-outer-spin-button,input.fld::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=range]{width:100%;accent-color:var(--clay)}
.aspects{display:flex;gap:5px;margin-top:7px}
.ap{flex:1;height:26px;border:0.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-2);font-size:11px;display:inline-flex;align-items:center;justify-content:center}
.ap.on{border:1.5px solid var(--clay);color:var(--clay)}
.seedrow{display:flex;gap:6px}.seedrow input{flex:1}
.sq{width:32px;height:32px;border:0.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-2);display:inline-flex;align-items:center;justify-content:center;flex:none}.sq:hover{border-color:var(--border-strong)}.sq svg{width:16px;height:16px}
.hint{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.4}
textarea.fld{height:auto;min-height:54px;padding:8px 10px;resize:vertical;line-height:1.4}
.disabled{opacity:.5;pointer-events:none}
.mhdr{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--text);margin:11px 0 7px;cursor:pointer;user-select:none}
.mhdr:hover{color:var(--clay)}
.mhdr .chev{display:inline-flex;color:var(--muted);transition:transform .15s}
.mhdr .chev svg{width:14px;height:14px}
.mhdr .chev.open{transform:rotate(90deg)}
.mhdr .hact{color:var(--clay);font-weight:400;font-size:11px;margin-left:1px}
#modelGroup .mhdr:first-of-type{margin-top:4px}
.mrow{display:flex;align-items:center;gap:10px;padding:9px 10px;border:0.5px solid var(--border);border-radius:10px;background:var(--surface-2);margin-bottom:7px;flex-wrap:wrap}
.mrow.active{border-color:var(--clay)}
.mic{width:30px;height:30px;border-radius:7px;background:var(--surface-1);display:flex;align-items:center;justify-content:center;color:var(--text-2);flex:none}.mic svg{width:16px;height:16px}
.mname{font-size:13px;font-weight:500}.msub{font-size:11px;color:var(--muted);font-family:var(--mono)}
.mtag{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--clay)}.mtag .dot{width:6px;height:6px;border-radius:50%;background:var(--clay)}
.mbtn{height:28px;padding:0 11px;border:0.5px solid var(--border-strong);border-radius:8px;background:var(--surface);font-size:12px;color:var(--text);display:inline-flex;align-items:center;gap:5px}.mbtn:hover{background:var(--surface-1)}.mbtn:disabled{opacity:.6}.mbtn svg{width:13px;height:13px}
.mdel{width:28px;height:28px;border:0.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-2);display:inline-flex;align-items:center;justify-content:center;flex:none}.mdel:hover{border-color:var(--border-strong)}.mdel svg{width:14px;height:14px}
.mprog{height:4px;border-radius:2px;background:var(--surface-1);overflow:hidden;margin-top:8px;flex-basis:100%}.mprog i{display:block;height:100%;width:0;background:var(--clay);border-radius:2px;transition:width .3s}
.progress{display:none;margin:8px 0 2px}.progress.show{display:block}
.bar{height:4px;border-radius:2px;background:var(--surface-1);overflow:hidden}.bar i{display:block;height:100%;width:0;background:var(--clay);border-radius:2px;transition:width .25s}
.pmeta{display:flex;justify-content:space-between;font-size:12px;color:var(--text-2);margin-top:8px;font-family:var(--mono)}
#results{display:flex;flex-direction:column;gap:14px}
.card{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--surface-2)}.card img{display:block;width:100%}
.cap{display:flex;align-items:center;gap:10px;padding:10px 12px}
.cap .txt{font-size:13px;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cap .meta{margin-left:auto;font-size:12px;color:var(--muted);font-family:var(--mono);white-space:nowrap}
.cap a{color:var(--text-2);display:inline-flex}.cap a:hover{color:var(--text)}.cap a svg{width:17px;height:17px}
.empty{text-align:center;color:var(--muted);font-size:14px;padding-top:6px}
.empty svg{width:100%;border-radius:14px;border:1px solid var(--border);display:block;margin:0 auto 12px;opacity:.85}
.err{display:none;border:1px solid var(--border);border-left:3px solid var(--clay);background:var(--surface-1);color:var(--text);font-size:13px;padding:11px 13px;border-radius:0 var(--radius) var(--radius) 0}.err.show{display:block}
</style>
</head>
<body>
<div class="top">
  <span class="logo" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.9 5.1L19 9l-5.1 1.9L12 16l-1.9-5.1L5 9l5.1-1.9z"/><path d="M19 14l.9 2.4 2.1.7-2.1.8-.9 2.1-.9-2.1-2.1-.8 2.1-.7z"/></svg></span>
  <span class="brand">Alis Studio</span>
  <span style="flex:1"></span>
  <span class="chip" id="activeChip" title="Active model"><span class="dot"></span><span id="activeName">—</span></span>
</div>

<div class="main">
  <div class="left">
    <div class="composer">
      <textarea id="prompt" rows="2" placeholder="Describe an image to generate…">a serene mountain lake at sunrise, mist over the water</textarea>
      <div class="crow">
        <button class="iconbtn on" id="safety" aria-label="NSFW safety filter on" title="NSFW safety filter: on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v6c0 4.4-3 7.6-7 9-4-1.4-7-4.6-7-9V6z"/><path d="M9 12l2 2 4-4"/></svg></button>
        <span style="flex:1"></span>
        <button class="gen" id="gen" disabled><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.9 5.1L19 9l-5.1 1.9L12 16l-1.9-5.1L5 9l5.1-1.9z"/></svg>Generate</button>
      </div>
    </div>
    <div class="progress" id="progress"><div class="bar"><i id="barfill"></i></div><div class="pmeta"><span id="pstep">Loading model…</span><span id="ptime"></span></div></div>
    <div class="err" id="err"></div>
    <div id="results"></div>
    <div class="empty" id="empty">
      <svg viewBox="0 0 560 300" aria-hidden="true"><rect width="560" height="300" fill="#e7ecf2"/><circle cx="416" cy="76" r="32" fill="#e9a87e"/><polygon points="0,212 140,95 280,212" fill="#c7d0db"/><polygon points="176,232 350,70 552,232" fill="#aebac8"/><polygon points="318,130 350,70 382,130" fill="#f1efe9"/><rect y="210" width="560" height="90" fill="#d7dfe8"/></svg>
      Your images will appear here.
    </div>
  </div>
  <div class="right">
    <div class="panel"><div class="ptitle">Settings</div><div id="modelGroup"></div><div id="paramGroups"></div></div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);
const prompt=$("#prompt"),gen=$("#gen"),results=$("#results"),empty=$("#empty"),errBox=$("#err");
const progress=$("#progress"),barfill=$("#barfill"),pstep=$("#pstep"),ptime=$("#ptime");
const modelGroup=$("#modelGroup"),paramGroups=$("#paramGroups"),activeName=$("#activeName"),safetyBtn=$("#safety");
let BACKENDS=[],CATALOG={backends:[],disk_gb:0},PV={},current="",safetyOn=true,busy=false,t0=0,timer=null;
const SVG_DL='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>';
const fmt=n=>(Math.round(n*10)/10).toFixed(1);
const showErr=m=>{errBox.textContent=m;errBox.classList.add("show");};
const m16=(x,min,max)=>Math.max(min,Math.min(max,Math.round(x/16)*16));
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const backendOf=v=>BACKENDS.find(b=>b.id===(v||"").split(":")[0]);

prompt.addEventListener("input",()=>{prompt.style.height="auto";prompt.style.height=Math.min(prompt.scrollHeight,220)+"px";});
prompt.addEventListener("keydown",e=>{if((e.metaKey||e.ctrlKey)&&e.key==="Enter")generate();});
safetyBtn.addEventListener("click",()=>{safetyOn=!safetyOn;safetyBtn.classList.toggle("on",safetyOn);safetyBtn.title="NSFW safety filter: "+(safetyOn?"on":"off");});
gen.addEventListener("click",generate);

async function loadAll(){
  try{
    const[m,c]=await Promise.all([fetch("/api/models").then(r=>r.json()),fetch("/api/catalog").then(r=>r.json())]);
    BACKENDS=m.backends||[]; CATALOG=c||{backends:[],disk_gb:0};
    if(!BACKENDS.length){showErr("No models available. Install a backend and restart.");return;}
    const builds=allBuilds(); const first=builds.find(b=>b.installed)||builds[0];
    if(!first){showErr("No model builds found.");return;}
    setActive(first.backend+":"+first.variant,true);
    reconcile();
  }catch(e){showErr("Couldn’t reach the server: "+e.message);}
}
let DOWNLOADING=false;
const EXPANDED=new Set();   // which model groups are expanded in the Model section
// the authoritative build list is /api/models variants, enriched with /api/catalog (size + install
// state). a variant with no catalog entry is a local/non-downloadable model: always usable, no buttons.
function allBuilds(){
  const cat={};(CATALOG.backends||[]).forEach(b=>b.entries.forEach(e=>cat[b.id+":"+e.variant]=e));
  const out=[];
  BACKENDS.forEach(b=>b.variants.forEach(v=>{const c=cat[b.id+":"+v.id];
    out.push({backend:b.id,blabel:b.label,variant:v.id,label:v.label,
      installed:c?!!c.installed:true,downloadable:!!c,size_gb:c?c.size_gb:null,note:c?c.note:(b.info||null)});}));
  return out;
}
const buildOf=model=>allBuilds().find(b=>b.backend+":"+b.variant===model);

function setActive(model,initial){
  const changedBackend=backendOf(model)!==backendOf(current);
  current=model;
  EXPANDED.add(model.split(":")[0]);   // keep the active model's group open
  const b=backendOf(model),bld=buildOf(model);
  activeName.textContent=b.label+" · "+(bld?bld.label.split(" · ")[0]:model.split(":")[1]);
  if(initial||changedBackend)renderParams(b);
  renderModelGroup();
}

// keep `current` on an installed build and gate Generate on it — never silently download via Generate
function reconcile(){
  const builds=allBuilds(),cur=builds.find(b=>b.backend+":"+b.variant===current);
  if(!cur||!cur.installed){const inst=builds.find(b=>b.installed);if(inst)setActive(inst.backend+":"+inst.variant);}
  const now=buildOf(current);
  gen.disabled=busy||!(now&&now.installed);
}

function renderModelGroup(){
  modelGroup.innerHTML="";
  const head=el("div","sgrp","Model");head.appendChild(el("span","disk",(CATALOG.disk_gb||0)+" GB"));modelGroup.appendChild(head);
  const builds=allBuilds(),byB={};
  builds.forEach(b=>(byB[b.backend]=byB[b.backend]||[]).push(b));   // one collapsible group per model
  Object.entries(byB).forEach(([bid,grp])=>{
    const open=EXPANDED.has(bid),active=grp.some(b=>b.backend+":"+b.variant===current);
    const chev='<span class="chev'+(open?" open":"")+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>';
    const hdr=el("div","mhdr",chev+grp[0].blabel+((active&&!open)?' <span class="hact">· active</span>':''));
    hdr.onclick=()=>{open?EXPANDED.delete(bid):EXPANDED.add(bid);renderModelGroup();};
    modelGroup.appendChild(hdr);
    if(open)grp.forEach(b=>modelGroup.appendChild(modelRow(b)));
  });
}

function modelRow(b){
  const id=b.backend+":"+b.variant,active=(id===current);
  const r=el("div","mrow"+(active?" active":""));
  r.appendChild(el("span","mic",'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" aria-hidden="true"><path d="M12 2l9 5v10l-9 5-9-5V7z"/><path d="M3 7l9 5 9-5M12 12v10"/></svg>'));
  const sub=b.downloadable?(b.size_gb+" GB · "+(b.note||"")):(b.note||"local model");
  const info=el("div",null,'<div class="mname">'+b.label+'</div><div class="msub">'+sub+'</div>');info.style.cssText="min-width:0;flex:1";r.appendChild(info);
  const right=el("div");right.style.cssText="display:flex;align-items:center;gap:7px";
  if(b.downloadable&&!b.installed){
    const dl=el("button","mbtn",'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Download');
    dl.setAttribute("aria-label","Download "+b.label);dl.onclick=()=>dlVariant(b,r,dl);right.appendChild(dl);
  }else if(active){
    right.appendChild(el("span","mtag",'<span class="dot"></span>Active'));
    if(b.downloadable)right.appendChild(delBtn(b));
  }else{
    const use=el("button","mbtn",null);use.textContent="Use";use.setAttribute("aria-label","Use "+b.label);use.onclick=()=>setActive(id);right.appendChild(use);
    if(b.downloadable)right.appendChild(delBtn(b));
  }
  r.appendChild(right);return r;
}
function delBtn(b){
  const d=el("button","mdel",'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>');
  d.title="Delete "+b.label;d.setAttribute("aria-label","Delete "+b.label);d.onclick=()=>delVariant(b);return d;
}

async function dlVariant(b,r,btn){
  if(DOWNLOADING){showErr("A download is already in progress.");return;}
  DOWNLOADING=true;btn.disabled=true;btn.textContent="Starting…";
  const pr=el("div","mprog","<i></i>");r.appendChild(pr);const fill=pr.querySelector("i");
  try{
    const res=await fetch("/api/download",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({backend:b.backend,variant:b.variant})});
    if(!res.ok||!res.body)throw new Error("server "+res.status);
    const reader=res.body.getReader(),dec=new TextDecoder();let buf="";
    while(true){const{value,done}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});let nl;
      while((nl=buf.indexOf("\n"))>=0){const line=buf.slice(0,nl);buf=buf.slice(nl+1);if(!line.trim())continue;const ev=JSON.parse(line);
        if(ev.type==="progress"){fill.style.width=(ev.total?Math.round(ev.done/ev.total*100):0)+"%";btn.textContent=fmt(ev.done/1e9)+" / "+fmt(ev.total/1e9)+" GB";}
        else if(ev.type==="error"){showErr(ev.message);}
      }}
  }catch(err){showErr("Download failed: "+err.message);}
  DOWNLOADING=false;await refreshCatalog();
}
async function delVariant(b){
  try{await fetch("/api/delete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({backend:b.backend,variant:b.variant})});}
  catch(err){showErr("Delete failed: "+err.message);}
  await refreshCatalog();
}
async function refreshCatalog(){try{CATALOG=await(await fetch("/api/catalog")).json();}catch(e){}renderModelGroup();reconcile();}

function renderParams(b){
  paramGroups.innerHTML="";PV={};
  if(!b||!b.params)return;
  const groups={};b.params.forEach(p=>(groups[p.group||"Settings"]=groups[p.group||"Settings"]||[]).push(p));
  for(const[g,ps]of Object.entries(groups)){paramGroups.appendChild(el("div","sgrp",g));ps.forEach(p=>paramGroups.appendChild(control(p)));}
}

function control(p){
  const c=el("div","ctl");
  if(p.type==="resolution"){
    PV.width=p.default_size;PV.height=p.default_size;let base=p.default_size,asp=p.default_aspect;
    const apply=()=>{const[a,bb]=asp.split(":").map(Number);let w,h;if(a>=bb){w=base;h=base*bb/a;}else{h=base;w=base*a/bb;}PV.width=m16(w,p.min,p.max);PV.height=m16(h,p.min,p.max);dim.textContent=PV.width+" × "+PV.height;};
    c.appendChild(el("div","lab","<span>"+p.label+"</span><b id='dimout'></b>"));
    const sel=el("select","fld");p.sizes.forEach(s=>{const o=el("option",null,s+" px");o.value=s;if(s===base)o.selected=true;sel.appendChild(o);});
    sel.onchange=()=>{base=+sel.value;apply();};c.appendChild(sel);
    const aw=el("div","aspects");p.aspects.forEach(a=>{const t=el("div","ap"+(a===asp?" on":""),a);t.onclick=()=>{asp=a;[...aw.children].forEach(x=>x.classList.remove("on"));t.classList.add("on");apply();};aw.appendChild(t);});
    c.appendChild(aw);const dim=c.querySelector("#dimout");apply();return c;
  }
  if(p.type==="int"||p.type==="float"){
    const step=p.step||(p.type==="float"?0.1:1);PV[p.key]=p.default;
    c.appendChild(el("div","lab","<span>"+p.label+"</span><b class='vo'>"+(p.type==="float"?p.default.toFixed(1):p.default)+"</b>"));
    const r=document.createElement("input");r.type="range";r.min=p.min;r.max=p.max;r.step=step;r.value=p.default;if(p.fixed)r.disabled=true;
    r.oninput=()=>{const v=+r.value;PV[p.key]=v;c.querySelector(".vo").textContent=p.type==="float"?v.toFixed(1):v;};
    c.appendChild(r);if(p.fixed)c.classList.add("disabled");if(p.hint)c.appendChild(el("div","hint",p.hint));return c;
  }
  if(p.type==="select"){
    PV[p.key]=p.default;c.appendChild(el("div","lab","<span>"+p.label+"</span>"));
    const sel=el("select","fld");p.options.forEach(o=>{const op=el("option",null,o.label);op.value=o.value;if(o.value===p.default)op.selected=true;sel.appendChild(op);});
    if(p.fixed){sel.disabled=true;c.classList.add("disabled");}sel.onchange=()=>PV[p.key]=sel.value;c.appendChild(sel);if(p.hint)c.appendChild(el("div","hint",p.hint));return c;
  }
  if(p.type==="seed"){
    PV.seed=p.default;c.appendChild(el("div","lab","<span>"+p.label+"</span>"));
    const row=el("div","seedrow");const inp=document.createElement("input");inp.type="number";inp.min=0;inp.className="fld";inp.value=p.default;
    inp.oninput=()=>PV.seed=Math.max(0,parseInt(inp.value||"0"));
    const dice=el("button","sq",'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.3" fill="currentColor"/><circle cx="15.5" cy="15.5" r="1.3" fill="currentColor"/><circle cx="12" cy="12" r="1.3" fill="currentColor"/></svg>');
    dice.title="Randomize seed";dice.onclick=()=>{const s=Math.floor(Math.random()*1e9);inp.value=s;PV.seed=s;};
    row.appendChild(inp);row.appendChild(dice);c.appendChild(row);return c;
  }
  if(p.type==="text"){
    PV[p.key]=p.default||"";c.appendChild(el("div","lab","<span>"+p.label+"</span>"));
    const ta=document.createElement("textarea");ta.className="fld";ta.value=p.default||"";if(p.enabled===false){ta.disabled=true;ta.placeholder="unsupported by this model";c.classList.add("disabled");}
    ta.oninput=()=>PV[p.key]=ta.value;c.appendChild(ta);if(p.hint)c.appendChild(el("div","hint",p.hint));return c;
  }
  return c;
}

function setBusy(b){busy=b;if(b)gen.disabled=true;else reconcile();}
async function generate(){
  if(busy)return;const p=prompt.value.trim();errBox.classList.remove("show");
  if(!p){showErr("Enter a prompt.");return;}
  if(!current){showErr("No model selected.");return;}
  const body={prompt:p,model:current,safety:safetyOn,params:{...PV}};
  setBusy(true);empty.style.display="none";
  progress.classList.add("show");barfill.style.width="0%";pstep.textContent="Loading model…";ptime.textContent="";
  t0=Date.now();clearInterval(timer);timer=setInterval(()=>ptime.textContent=fmt((Date.now()-t0)/1000)+"s",100);
  try{
    const res=await fetch("/api/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!res.ok||!res.body)throw new Error("server error "+res.status);
    const reader=res.body.getReader(),dec=new TextDecoder();let buf="";
    while(true){const{value,done}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});let nl;
      while((nl=buf.indexOf("\n"))>=0){const line=buf.slice(0,nl);buf=buf.slice(nl+1);if(line.trim())handle(JSON.parse(line),p);}}
  }catch(e){showErr("Generation failed: "+e.message);}
  finally{setBusy(false);clearInterval(timer);progress.classList.remove("show");}
}
function handle(ev,p){
  if(ev.type==="step"){barfill.style.width=Math.round(ev.step/ev.total*100)+"%";pstep.textContent="Generating · step "+ev.step+" / "+ev.total;}
  else if(ev.type==="done"){barfill.style.width="100%";ev.images.forEach((u,i)=>renderCard(u,p,ev.meta,i,ev.images.length));}
  else if(ev.type==="error"){showErr(ev.message||"Generation failed.");}
}
function renderCard(uri,p,meta,i,n){
  const card=el("div","card");const sl=meta.seed+(n>1?("·"+(i+1)):"");
  card.innerHTML='<img alt="'+p.replace(/"/g,"&quot;")+'" src="'+uri+'"><div class="cap"><span class="txt">'+p+'</span><span class="meta">'+meta.model+' · '+meta.width+'×'+meta.height+' · '+meta.steps+' steps · seed '+sl+' · '+fmt(meta.seconds)+'s</span><a title="Download" aria-label="Download">'+SVG_DL+'</a></div>';
  card.querySelector("a").onclick=()=>{const a=document.createElement("a");a.href=uri;a.download="alis_"+meta.seed+(n>1?("_"+(i+1)):"")+".png";a.click();};
  results.insertBefore(card,results.firstChild);
}
loadAll();
</script>
